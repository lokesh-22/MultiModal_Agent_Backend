version: "3.9"

services:
	backend:
		build:
			context: ./backend
			dockerfile: Dockerfile
		container_name: ama-backend
		env_file:
			- ./backend/.env
		ports:
			- "8000:8000"
		volumes:
			- ./backend/uploads:/app/uploads
		restart: unless-stopped

	frontend:
		image: node:20-alpine
		container_name: ama-frontend
		working_dir: /app
		command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
		environment:
			NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
		ports:
			- "3000:3000"
		volumes:
			- ./frontend:/app
		depends_on:
			- backend
		restart: unless-stopped
